<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - YOZ-G Ticaret</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.arkaplan {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    z-index: 999;
}
.icerik {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: white;
    width: 90%;
    max-width: 480px;
    border-radius: 16px;
    padding: 40px 30px;
    z-index: 1000;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
}
.kapatma_btn{
    position: absolute;
    top: 15px;
    right: 15px;
    background: none;
    border: none;
    font-size: 20px;
    color: #999;
    cursor: pointer;
    transition: all ease-in-out 0.3s;
}
.kapatma_btn:hover{
    color: #333;
}
.icerik_yazi{
    text-align: center;
}
.icerik_yazi h2{
    font-size: 24px;
    font-weight: 600;
    color: #333;
    margin-bottom: 15px;
}
.icerik_yazi p{
    font-size: 15px;
    color: #666;
    line-height: 1.5;
    margin-bottom: 35px;
}
.cinsiyet_butonlari{
    display: flex;
    gap: 20px;
    justify-content: center;
}
a{
    text-decoration: none;
}
.cinsiyet_btn{
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 30px 20px;
    background-color: #f5f5f5;
    border: 2px solid transparent;
    border-radius: 12px;
    cursor: pointer;
    transition: all ease-in-out 0.3s;
}
.cinsiyet_btn:hover{
    background-color: #fff;
    border-color: #ff6000;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(255, 96, 0, 0.2);
}
.cinsiyet_btn i{
    font-size: 60px;
    color: #ff6000;
}
.cinsiyet_btn span{
    font-size: 18px;
    font-weight: 600;
    color: white;
    background-color: #ff6000;
    padding: 12px 40px;
    border-radius: 8px;
}
.cinsiyet_btn:hover span {
    background-color: #ff7a1a;
}
    </style>
</head>
<body>
    <div class="arkaplan"></div>
    <div class="icerik">
        <button class="kapatma_btn">
            <i class="fas fa-times"></i>
        </button>
        <div class="icerik_yazi">
            <h2>Aradığın her şey YOZ-Ticaret'te!</h2>
            <p>Sana özel öneriler sunabilmemiz için hangi ürünlerle ilgilendiğini seçebilir misin?</p>
            <div class="cinsiyet_butonlari">
                <a href="anasayfa.html"><button class="cinsiyet_btn">
                    <i class="fas fa-user"></i>
                    <span>Kadın</span>
                </button></a>
                <a href="anasayfa.html"><button class="cinsiyet_btn">
                    <i class="fas fa-user"></i>
                    <span>Erkek</span>
                </button></a>
            </div>
        </div>
    </div>
</body>
</html>

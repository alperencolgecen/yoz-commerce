<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çıkış Yap - YOZ-G Ticaret</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/body.css">
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #878787 50% transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;

        }
        a{
            text-decoration: none;
            color: inherit;
        }
        .arkaplan{
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
        .icerik{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            width: 90%;
            max-width: 480px;
            border-radius: 16px;
            padding: 40px 30px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .kapatma_btn{
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            transition: all ease-in-out 0.3s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .kapatma_btn:hover{
            color: #333;
            background-color: #f5f5f5;
            border-radius: 50%;
        }
        .icerik_yazi{
            text-align: center;
        }
        .icerik_yazi h2{
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        .icerik_yazi p{
            font-size: 15px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 35px;
        }
        .butonlar{
            display: flex;
            gap: 15px;
            justify-content: space-evenly;
            margin: auto;
        }
        .ikon_div{
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            background-color: #fff5f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ikon_div i{
            font-size: 40px;
            color: #ff6000;
        }
        .iptal_btn{
            margin-top: 15px;
            text-decoration: none;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
        }
        .cikis_btn{
            text-decoration: none;
            border: none;
            background: transparent;
            margin: auto;
            justify-content: space-evenly;
        }
        .cikis_btn .btn2 p{
            color: white;
            transform: translateY(10px);
        }
        .btn1{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #666;
            border-color: #e0e0e0;
            width: 180px;
            height: 50px;
            border-radius: 20px;
            cursor: pointer;   
            transition: all ease-in-out 0.3s; 
            transform: translateX(50px);
        }
        .btn1:hover{
            background-color: #e0e0e0;
            color: #333;
        }
        .btn2{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ff7300;
            color: #ffffff;
            border-color: #e0e0e0;
            width: 180px;
            height: 50px;
            border-radius: 20px;
            transition: all ease-in-out 0.3s;
        }
        .btn2:hover{
            background-color: #ff7a1a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 96, 0, 0.3);
        }
    </style>
</head>

<body>
    <div class="arkaplan"></div>
    <div class="icerik">
        <button class="kapatma_btn">
            <i class="fas fa-times"></i>
        </button>
        <div class="icerik_yazi">
            <div class="ikon_div">
                <i class="fas fa-sign-out-alt"></i>
            </div>
            <h2>Çıkış Yap</h2>
            <p>Çıkış yapmak istediğinizden emin misiniz?</p>
            <div class="butonlar">
                <a href="anasayfa.html"><div class="btn1"><button class="iptal_btn">İptal</button></div></a>
                <a href="https://google.com" class="cikis_btn"><div class="btn2"><p>Çıkış Yap</p></div></a>
            </div>
        </div>
    </div>
</body>

</html>
